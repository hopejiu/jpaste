<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="jPaste logo">
  <!--
    jPaste Logo — Clipboard Mascot Modern
    Type: Pictorial Mark + Mascot Modern
    Palette: Modern Purple (#7C3AED / #A78BFA / #F472B6)
    Accent:  Cyan (#22D3EE)
    BG:      White (#FFFFFF)
    
    Scalability checklist:
    ✓ Recognizable at 16×16 (clipboard silhouette + eyes as dots)
    ✓ Works in single color (purple outline version)
    ✓ Clear in grayscale (high contrast shapes)
    ✓ No sub-16px details
  -->

  <defs>
    <!-- Board gradient -->
    <linearGradient id="board" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <!-- Clip gradient (subtle J highlight) -->
    <linearGradient id="clip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <!-- Inner paper -->
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5F3FF"/>
    </linearGradient>
    <!-- Drop shadow (board) -->
    <filter id="shadow" x="-8%" y="-4%" width="116%" height="112%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#7C3AED" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- White canvas circle (optional badge background) -->
  <circle cx="256" cy="256" r="244" fill="#FAFAFE"/>

  <!-- ============================================ -->
  <!--  CLIPBOARD BODY                               -->
  <!-- ============================================ -->
  <g filter="url(#shadow)">
    <!-- Main board — rounded rectangle -->
    <rect x="132" y="140" width="248" height="288" rx="32" ry="32" fill="url(#board)"/>

    <!-- Inner glow line -->
    <rect x="136" y="144" width="240" height="280" rx="28" ry="28" fill="none" stroke="#DDD6FE" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- ============================================ -->
  <!--  CLIP (J-shaped at top)                      -->
  <!-- ============================================ -->
  <g>
    <!-- Main clip body -->
    <rect x="190" y="106" width="132" height="52" rx="18" ry="18" fill="url(#clip)"/>
    <!-- Clip highlight bar -->
    <rect x="200" y="114" width="112" height="6" rx="3" fill="#EDE9FE" opacity="0.5"/>
    <!-- Clip grip grooves -->
    <rect x="200" y="126" width="112" height="5" rx="2.5" fill="#EDE9FE" opacity="0.35"/>
    <rect x="200" y="135" width="112" height="5" rx="2.5" fill="#EDE9FE" opacity="0.25"/>
    <rect x="200" y="144" width="112" height="4" rx="2" fill="#EDE9FE" opacity="0.18"/>
  </g>

  <!-- ============================================ -->
  <!--  PAPER INSERT (white area)                   -->
  <!-- ============================================ -->
  <g>
    <!-- Paper background -->
    <rect x="150" y="196" width="212" height="210" rx="16" ry="16" fill="url(#paper)"/>

    <!-- Paper texture lines (ghost) -->
    <line x1="166" y1="236" x2="310" y2="236" stroke="#E8E5F8" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="166" y1="252" x2="310" y2="252" stroke="#E8E5F8" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="166" y1="268" x2="296" y2="268" stroke="#E8E5F8" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="166" y1="284" x2="304" y2="284" stroke="#E8E5F8" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="166" y1="300" x2="280" y2="300" stroke="#E8E5F8" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="166" y1="316" x2="260" y2="316" stroke="#E8E5F8" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- ============================================ -->
  <!--  KAWAII FACE (minimal anime eyes)            -->
  <!-- ============================================ -->
  <g transform="translate(256, 284)">
    <!-- Left eye — large anime eye -->
    <ellipse cx="-30" cy="-8" rx="18" ry="22" fill="#1E1B4B"/>
    <!-- Left iris (cyan accent) -->
    <ellipse cx="-30" cy="-14" rx="9" ry="11" fill="#22D3EE" opacity="0.85"/>
    <!-- Left pupil -->
    <circle cx="-30" cy="-12" r="6" fill="#1E1B4B"/>
    <!-- Left catchlight 1 -->
    <circle cx="-26" cy="-18" r="4.5" fill="#FFFFFF"/>
    <!-- Left catchlight 2 -->
    <circle cx="-34" cy="-8" r="2.5" fill="#FFFFFF" opacity="0.7"/>

    <!-- Right eye — large anime eye -->
    <ellipse cx="30" cy="-8" rx="18" ry="22" fill="#1E1B4B"/>
    <!-- Right iris (cyan accent) -->
    <ellipse cx="30" cy="-14" rx="9" ry="11" fill="#22D3EE" opacity="0.85"/>
    <!-- Right pupil -->
    <circle cx="30" cy="-12" r="6" fill="#1E1B4B"/>
    <!-- Right catchlight 1 -->
    <circle cx="34" cy="-18" r="4.5" fill="#FFFFFF"/>
    <!-- Right catchlight 2 -->
    <circle cx="26" cy="-8" r="2.5" fill="#FFFFFF" opacity="0.7"/>

    <!-- Blush (soft pink ellipses) -->
    <ellipse cx="-48" cy="14" rx="12" ry="7" fill="#F472B6" opacity="0.3"/>
    <ellipse cx="48" cy="14" rx="12" ry="7" fill="#F472B6" opacity="0.3"/>

    <!-- Tiny kawaii mouth -->
    <path d="M-5,18 Q0,24 5,18" fill="none" stroke="#EC4899" stroke-width="2" stroke-linecap="round"/>
    <!-- Tongue dot -->
    <ellipse cx="0" cy="21.5" rx="2.5" ry="2" fill="#F472B6" opacity="0.5"/>
  </g>

  <!-- ============================================ -->
  <!--  PASTE ICON (bottom-right paper area)        -->
  <!-- ============================================ -->
  <g transform="translate(320, 376)" opacity="0.9">
    <!-- Mini clipboard icon representing paste action -->
    <rect x="-16" y="-17" width="32" height="34" rx="5" fill="#A78BFA"/>
    <rect x="-9" y="-11" width="18" height="2" rx="1" fill="#FFFFFF" opacity="0.6"/>
    <rect x="-9" y="-5"  width="14" height="2" rx="1" fill="#FFFFFF" opacity="0.45"/>
    <rect x="-9" y="1"   width="16" height="2" rx="1" fill="#FFFFFF" opacity="0.3"/>
    <!-- Mini clip -->
    <rect x="-7" y="-22" width="14" height="7" rx="2" fill="#8B5CF6"/>
    <!-- Paste arrow -->
    <path d="M10,-6 L14,0 L10,6" fill="none" stroke="#22D3EE" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ============================================ -->
  <!--  SPARKLE (anime accent, 1 only — minimal)    -->
  <!-- ============================================ -->
  <g transform="translate(396, 150)" opacity="0.55">
    <path d="M0,-12 L2.5,-3.5 L12,0 L2.5,3.5 L0,12 L-2.5,3.5 L-12,0 L-2.5,-3.5 Z" fill="#22D3EE"/>
  </g>

  <!-- ============================================ -->
  <!--  "J" BADGE (bottom center, subtle)           -->
  <!-- ============================================ -->
  <g transform="translate(256, 446)">
    <ellipse cx="0" cy="0" rx="22" ry="14" fill="#A78BFA" opacity="0.15"/>
    <text x="0" y="5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#7C3AED" opacity="0.55">J</text>
  </g>

</svg>
