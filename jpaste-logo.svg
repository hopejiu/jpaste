<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="jPaste logo optimized">
  <defs>
    <!-- 主板渐变 -->
    <linearGradient id="board" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <!-- 夹子渐变 -->
    <linearGradient id="clip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <!-- 纸张渐变 -->
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5F3FF"/>
    </linearGradient>
    <!-- 阴影滤镜 -->
    <filter id="shadow" x="-10%" y="-5%" width="120%" height="115%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#7C3AED" flood-opacity="0.2"/>
    </filter>
    <!-- 数据流线条图案 -->
    <pattern id="data-lines" patternUnits="userSpaceOnUse" width="20" height="10">
      <path d="M0,5 Q5,0 10,5 T20,5" fill="none" stroke="#E8E5F8" stroke-width="1.5" stroke-linecap="round"/>
    </pattern>
  </defs>

  <!-- 背景圆 -->
  <circle cx="256" cy="256" r="244" fill="#FAFAFE"/>

  <!-- ============================================ -->
  <!--  剪贴板主体 (Clipboard Board)                -->
  <!-- ============================================ -->
  <g filter="url(#shadow)">
    <!-- 圆角矩形板 -->
    <rect x="120" y="130" width="272" height="300" rx="36" ry="36" fill="url(#board)"/>
    <!-- 内部高光 -->
    <rect x="126" y="136" width="260" height="288" rx="30" ry="30" fill="none" stroke="#DDD6FE" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- ============================================ -->
  <!--  剪贴板夹子 (Clip - 更具象的J形/回形针)       -->
  <!-- ============================================ -->
  <g transform="translate(0, -10)">
    <!-- 夹子上半部分 -->
    <path d="M180,160 C200,130 300,130 320,160 L310,175 C295,155 215,155 200,175 Z" fill="url(#clip)" stroke="#EDE9FE" stroke-width="1.5"/>
    <!-- 夹子下半部分 (阴影) -->
    <path d="M200,175 L310,175 C300,195 210,195 200,175 Z" fill="#8B5CF6" opacity="0.3"/>
  </g>

  <!-- ============================================ -->
  <!--  纸张内容 (Paper with Data)                 -->
  <!-- ============================================ -->
  <g>
    <!-- 纸张背景 -->
    <rect x="148" y="200" width="216" height="190" rx="14" ry="14" fill="url(#paper)" stroke="#E0D9FF" stroke-width="0.5"/>
    
    <!-- 数据流线条 (使用Pattern填充，更有科技感) -->
    <rect x="158" y="220" width="196" height="150" rx="10" fill="url(#data-lines)" opacity="0.6"/>
    
    <!-- 光标闪烁效果 (模拟输入状态) -->
    <rect x="168" y="225" width="2" height="18" fill="#EC4899" opacity="0.7"/>
  </g>

  <!-- ============================================ -->
  <!--  二次元面部 (Kawaii Face - 睛眼/星星眼)      -->
  <!-- ============================================ -->
  <g transform="translate(256, 280)">
    <!-- 左眼 (星星眼) -->
    <ellipse cx="-32" cy="-10" rx="16" ry="18" fill="#1E1B4B">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite"/>
    </ellipse>
    <!-- 左星星虹膜 -->
    <polygon cx="-32" cy="-16" points="0,-8 2.5,-2.5 8,0 2.5,2.5 0,8 -2.5,2.5 -8,0 -2.5,-2.5" fill="#22D3EE" transform="rotate(-20)">
      <animateTransform attributeName="transform" type="rotate" values="0,0,0; 360,0,0" dur="10s" repeatCount="indefinite"/>
    </polygon>
    
    <!-- 右眼 (眨眼效果) -->
    <ellipse cx="32" cy="-10" rx="16" ry="18" fill="#1E1B4B">
      <!-- 快速眨眼动画 -->
      <animate attributeName="ry" values="18;4;18" dur="2s" begin="1s" repeatCount="indefinite"/>
    </ellipse>
    <!-- 右眼高光 -->
    <circle cx="36" cy="-14" r="5" fill="#FFFFFF"/>
  </g>

  <!-- ============================================ -->
  <!--  粘贴图标 (Paste Icon - 动态感)              -->
  <!-- ============================================ -->
  <g transform="translate(330, 360)">
    <!-- 粘贴板图标 -->
    <rect x="-14" y="-14" width="28" height="30" rx="4" fill="#A78BFA" opacity="0.9"/>
    <!-- 粘贴箭头 -->
    <path d="M-5,-8 L0,-2 L5,-8" fill="none" stroke="#22D3EE" stroke-width="2.5" stroke-linecap="round">
      <!-- 箭头跳动动画 -->
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-2; 0,0" dur="1.5s" repeatCount="indefinite"/>
    </path>
  </g>

</svg>